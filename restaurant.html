<!-- 篩選區 -->
<section class="section-block section-tight">
  <div class="container">
    <div class="brand-banner">

      <div class="row g-3 align-items-center">

        <div class="col-md-4">
          <input type="text" id="keywordInput" class="form-control" placeholder="搜尋餐廳名稱">
        </div>

        <div class="col-md-3">
          <select id="typeSelect" class="form-select">
            <option value="">餐廳類型</option>
            <option value="燒肉">燒肉</option>
            <option value="火鍋">火鍋</option>
            <option value="咖啡廳">咖啡廳</option>
          </select>
        </div>

        <div class="col-md-3">
          <select id="areaSelect" class="form-select">
            <option value="">餐廳地區</option>
            <option value="台北">台北</option>
            <option value="新北">新北</option>
            <option value="桃園">桃園</option>
            <option value="台中">台中</option>
            <option value="台南">台南</option>
            <option value="高雄">高雄</option>
          </select>
        </div>

        <div class="col-md-2">
          <button class="btn btn-brown w-100" onclick="searchRestaurant()">搜尋</button>
        </div>

      </div>

    </div>
  </div>
</section>

<!-- 餐廳列表 -->
<section class="section-block">

</section>

<script>
let restaurantData = [];

fetch("data.json")
  .then(res => res.json())
  .then(data => {
    restaurantData = data;
    renderRestaurants(data);
  });

function searchRestaurant() {
  const keyword = document.getElementById("keywordInput").value.trim();
  const type = document.getElementById("typeSelect").value;
  const area = document.getElementById("areaSelect").value;

  const filtered = restaurantData.filter(item =>
    item.name.includes(keyword) &&
    (type === "" || item.type === type) &&
    (area === "" || item.area === area)
  );

  renderRestaurants(filtered);
}

function renderRestaurants(data) {
  let html = "";

  if (data.length === 0) {
    html = `
      <div class="col-12">
        <div class="brand-banner">
          <p class="mb-0 text-start">找不到符合條件的餐廳。</p>
        </div>
      </div>
    `;
  } else {
    data.forEach(item => {
      html += `
        <div class="col-md-6">
          <div class="featured-card h-100">
            <div class="featured-card-body d-flex flex-column" style="text-align:left; padding: 2rem;">

              <!-- 第一排：左圖 / 右標題 -->
              <div class="row g-4 align-items-start mb-4">
                <div class="col-12 col-sm-4">
                  <img
                    src="${item.image}"
                    class="img-fluid w-100"
                    style="height: 160px; object-fit: cover; border-radius: 14px;"
                    alt="${item.imageAlt}"
                    title="${item.imageTitle}"
                    aria-label="${item.imageAriaLabel}">
                </div>

                <div class="col-12 col-sm-8 d-flex flex-column justify-content-center">
                  <h3 class="text-start mb-2">${item.name}</h3>
                  <p class="text-muted text-start mb-0">${item.area}｜${item.type}</p>
                </div>
              </div>
              <!-- 第二排：標籤 -->
              <div class="mb-3 d-flex flex-wrap gap-2 justify-content-start">
                <span class="badge bg-${item.badgeColor1}">${item.badge1}</span>
                <span class="badge bg-${item.badgeColor2}">${item.badge2}</span>
                <span class="badge bg-${item.badgeColor3}">${item.badge3}</span>
                <span class="badge bg-${item.badgeColor4}">${item.badge4}</span>
              </div>

              <!-- 第三排：說明 -->
              <p class="text-start mb-4">${item.description}</p>

              <!-- 右下角按鈕 -->
              <div class="mt-auto d-flex justify-content-end gap-2">
                <a href="${item.map}" class="btn btn-outline-brown btn-sm" target="_blank">地圖</a>
                <a href="${item.review}" class="btn btn-brown btn-sm">食記</a>
              </div>

            </div>
          </div>
        </div>
      `;
    });
  }

  document.getElementById("restaurantList").innerHTML = html;
  document.getElementById("resultCount").textContent =
    "共找到 " + data.length + " 間餐廳";
}
</script>
